# HyperFleet Adapter task configuration for adapter3
params:

  - name: "nodepoolId"
    source: "event.id"
    type: "string"
    required: true
    
  - name: "clusterId"
    source: "event.owner_references.id"
    type: "string"
    required: true

  - name: "generation"
    source: "event.generation"
    type: "int"
    required: true

  - name: "namespace"
    source: "env.NAMESPACE"
    type: "string"

# Preconditions with valid operators and CEL expressions
preconditions:
  - name: "nodepoolStatus"
    api_call:
      method: "GET"
      url: "/clusters/{{ .clusterId }}/nodepools/{{ .nodepoolId }}"
      timeout: 10s
      retry_attempts: 3
      retry_backoff: "exponential"
    capture:
      - name: "nodepoolName"
        field: "name"
      - name: "generation"
        field: "generation"
      - name: "nodepoolNotReady"
        expression: |
          status.conditions.filter(c, c.type == "Ready").size() > 0
            ? status.conditions.filter(c, c.type == "Ready")[0].status != "True"
            : true
      - name: "nodepoolReadyTTL"
        expression: |
          (timestamp(now()) - timestamp(
            status.conditions.filter(c, c.type == "Ready").size() > 0
              ? status.conditions.filter(c, c.type == "Ready")[0].last_transition_time
              : now()
          )).getSeconds() > 300

  - name: "validationCheck"
    # Precondition passes if nodepool is NOT Ready OR if nodepool is Ready and stable for >300 seconds since last transition (enables self-healing)
    expression: |
      nodepoolNotReady || nodepoolReadyTTL

# Resources with valid K8s manifests
resources:
  - name: "resource0"
    transport:
      client: "kubernetes"
    manifest:
      apiVersion: v1
      kind: ConfigMap
      data:
        nodepoolId: "{{ .nodepoolId }}"
      metadata:
        name: "{{ .nodepoolId }}-adapter3-configmap"
        namespace: "{{ .namespace }}"
        labels:
          app.kubernetes.io/component: adapter-task-config
          app.kubernetes.io/instance: adapter3
          app.kubernetes.io/name: hyperfleet-adapter
          app.kubernetes.io/version: 1.0.0
          hyperfleet.io/nodepool-id: "{{ .nodepoolId }}"
          hyperfleet.io/nodepool-name: "{{ .nodepoolName }}"
    discovery:
      namespace: "{{ .namespace }}"
      by_selectors:
        label_selector:
          hyperfleet.io/nodepool-id: "{{ .nodepoolId }}"
          hyperfleet.io/nodepool-name: "{{ .nodepoolName }}"

# Post-processing with valid CEL expressions
post:
  payloads:
    - name: "statusPayload"
      build:
        adapter: "{{ .adapter.name }}"
        conditions:
          # Applied: Job successfully created
          - type: "Applied"
            status:
              expression: |
                has(resources.resource0.metadata.creationTimestamp)
                ? "True"
                : "False"
            reason:
              expression: |
                has(resources.resource0.metadata.creationTimestamp)
                  ? "ConfigMap manifest applied successfully"
                  : "ConfigMap is pending to be applied"
            message:
              expression: |
                has(resources.resource0.metadata.creationTimestamp)
                  ? "ConfigMap manifest applied successfully"
                  : "ConfigMap is pending to be applied"
          # Available: Check job status conditions
          - type: "Available"
            status:
              expression: |
                has(resources.resource0.data.nodepoolId)
                  ? "True"
                  : "False"
            reason:
              expression: |
                has(resources.resource0.data.nodepoolId)
                  ? "ConfigMap data available"
                  : "ConfigMap data not yet available"
            message:
              expression: |
                has(resources.resource0.data.nodepoolId)
                  ? "ConfigMap data available"
                  : "ConfigMap data not yet available"
          # Health: Adapter execution status (runtime)
          - type: "Health"
            status:
              expression: |
                has(resources.resource0.data.nodepoolId)
                  ? "True"
                  : "False"
            reason:
              expression: |
                has(resources.resource0.data.nodepoolId)
                  ? "ConfigMap data available"
                  : "ConfigMap data not yet available"
            message:
              expression: |
                toJson(resources.resource0)
        # Event generation ID metadata field needs to use expression to avoid interpolation issues
        observed_generation:
          expression: "generation"
        observed_time: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"
        # Optional data field for adapter-specific metrics extracted from resources
        data:
          namespace:
            name:
              expression: |
                resources.?resource0.?metadata.?name.orValue("")
            creationTimestamp:
              expression: |
                resources.?resource0.?metadata.?creationTimestamp.orValue("")

  post_actions:
    - name: "reportNodepoolStatus"
      api_call:
        method: "POST"
        url: "/clusters/{{ .clusterId }}/nodepools/{{ .nodepoolId }}/statuses"
        headers:
          - name: "Content-Type"
            value: "application/json"
        body: "{{ .statusPayload }}"
